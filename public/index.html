<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Khmer Subtitle</title>

<style>
body{
    background:#000;
    color:white;
    text-align:center;
    font-family:Arial,sans-serif;
}

h1{
    color:#00ff99;
    margin-top:40px;
}

textarea{
    width:80%;
    height:180px;
    margin-top:20px;
    font-size:24px;
    padding:15px;
}

button{
    margin-top:20px;
    background:#00ff99;
    border:none;
    padding:15px 40px;
    font-size:28px;
    border-radius:12px;
    cursor:pointer;
}

#result{
    margin:30px auto;
    width:80%;
    min-height:120px;
    background:#222;
    border-radius:15px;
    padding:20px;
    font-size:28px;
}
</style>
</head>

<body>

<h1>AI Khmer Subtitle</h1>

<h2>Type English subtitle:</h2>

<textarea id="englishText"></textarea>

<br>

<button id="translateBtn">Translate</button>

<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
