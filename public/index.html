<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Khmer Subtitle</title>

<style>

body{
background:#000;
color:white;
text-align:center;
font-family:Arial,sans-serif;
}

h1{
color:#00ff99;
}

textarea{
width:85%;
height:200px;
font-size:28px;
padding:15px;
}

button{
margin-top:20px;
padding:15px 40px;
font-size:28px;
background:#00ff99;

border-radius:10px;
cursor:pointer;
}

#result{
margin:30px auto;
width:85%;
min-height:120px;
background:#222;
padding:20px;
border-radius:12px;

}

</style>
</head>

<body>

<h1>AI Khmer Subtitle</h1>

<h2>Type English subtitle:</h2>

<textarea id="englishText"></textarea>

<br>

<button id="translateBtn">
Translate
</button>

<div id="result"></div>

<button id="micBtn">🎤 Speak</button>
<button id="speakBtn">🔊 Speak Khmer</button>

<script src="script.js"></script>

</body>
</html>
