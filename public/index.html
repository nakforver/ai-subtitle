<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AI Khmer Subtitle</title>

<style>

body{
background:#000;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

h1{
text-align:center;
color:#00ff99;
}

textarea{
width:100%;
height:180px;
padding:15px;
font-size:20px;
border-radius:12px;
margin-top:10px;
}

button{
width:100%;
padding:15px;
margin-top:20px;
font-size:22px;
background:#00ff99;
border:none;
border-radius:12px;
cursor:pointer;
}

#status{
margin-top:15px;
font-size:18px;
color:#00ff99;
text-align:center;
}

</style>
</head>

<body>

<h1>AI Khmer Subtitle</h1>

<h3>English Subtitle</h3>

<textarea
id="detectedText"
placeholder="Type English subtitle here..."
></textarea>

<button id="generateBtn">
Translate Khmer
</button>

<div id="status">
Ready
</div>

<h3>Khmer Subtitle</h3>

<textarea
id="khmerText"
placeholder="Khmer translation..."
></textarea>

<button id="speakBtn">
🔊 Speak Khmer
</button>

<script src="script.js"></script>

</body>
</html>
