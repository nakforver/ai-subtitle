<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Khmer Subtitle Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
padding:15px;
}

.container{
max-width:500px;
margin:auto;
}

h1{
text-align:center;
color:#00ff99;
margin-top:20px;
margin-bottom:20px;
}

.card{
background:#181818;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.uploadBox{
border:2px dashed #00ff99;
padding:40px 15px;
border-radius:20px;
text-align:center;
}

input[type=file]{
width:100%;
margin-top:15px;
}

textarea{
width:100%;
height:180px;
border:none;
border-radius:15px;
padding:15px;
font-size:20px;
margin-top:10px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
font-size:20px;
font-weight:bold;
margin-top:15px;
cursor:pointer;
}

.primary{
background:#00ff99;
color:black;
}

.secondary{
background:#333;
color:white;
}

.result{
background:#222;
min-height:150px;
padding:20px;
border-radius:15px;
font-size:24px;
line-height:1.8;
}

.row{
display:flex;
gap:10px;
}

.row button{
flex:1;
}

.status{
text-align:center;
color:#00ff99;
margin-top:10px;
font-size:18px;
}

</style>
</head>
<body>

<div class="container">

<h1>AI Khmer Subtitle Pro</h1>

<div class="card">

<div class="uploadBox">

<h2>📹 Upload Movie</h2>

<p>
English / Chinese Video
</p>

<input
type="file"
id="videoFile"
accept="video/*">

</div>

<button
class="primary"
id="uploadBtn">
🚀 Generate Khmer Subtitle
</button>

<div
class="status"
id="status">
Waiting...
</div>

</div>

<div class="card">

<h2>Detected Text</h2>

<textarea
id="englishText"></textarea>

<button
class="primary"
id="translateBtn">
🌐 Translate Khmer
</button>

</div>

<div class="card">

<h2>Khmer Subtitle</h2>

<div
class="result"
id="result">
Result will appear here
</div>

<div class="row">

<button
class="primary"
id="speakBtn">
🔊 Speak Khmer
</button>

<button
class="secondary"
id="downloadBtn">
⬇ Download SRT
</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
