<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>AI Khmer Subtitle Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

h1{
text-align:center;
color:#00ff99;
margin-bottom:25px;
font-size:42px;
font-weight:bold;
}

.card{
background:#080808;
padding:25px;
border-radius:25px;
margin-bottom:20px;
}

.upload-box{
border:4px dashed #00ff99;
border-radius:25px;
padding:40px 20px;
text-align:center;
}

.upload-box h2{
font-size:42px;
margin-bottom:10px;
}

.upload-box p{
font-size:22px;
color:#ccc;
margin-bottom:20px;
}

.upload-btn{
display:inline-block;
padding:16px 30px;
background:#00ff99;
color:#000;
font-size:22px;
font-weight:bold;
border-radius:15px;
cursor:pointer;
}

#videoFile{
display:none;
}

#fileName{
margin-top:15px;
color:#00ff99;
font-size:18px;
}

.btn{
width:100%;
padding:22px;
background:#00ff99;
border:none;
border-radius:20px;
font-size:30px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

.btn:hover{
opacity:.9;
}

.status{
text-align:center;
margin-top:20px;
font-size:22px;
color:#00ff99;
}

textarea{
width:100%;
height:220px;
padding:15px;
font-size:20px;
border-radius:20px;
border:none;
outline:none;
resize:none;
}

.section-title{
font-size:40px;
font-weight:bold;
margin-bottom:15px;
}

.speak-btn{
width:100%;
padding:20px;
background:#00ff99;
border:none;
font-size:28px;
font-weight:bold;
border-radius:20px;
margin-top:20px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Khmer Subtitle Pro</h1>

<div class="card">

<div class="upload-box">

<h2>🎬 Upload Movie</h2>

<p>English / Chinese Video</p>

<label
for="videoFile"
class="upload-btn"
>
📁 Select Video
</label>

<input
type="file"
id="videoFile"
accept="video/*"
/>

<div id="fileName">
No file selected
</div>

</div>

<button
id="translateBtn"
class="btn"
>
🚀 Generate Khmer Subtitle
</button>

<div
id="status"
class="status"
>
Waiting...
</div>

</div>

<div class="card">

<div class="section-title">
Detected Text
</div>

<textarea
id="englishText"
placeholder="Detected English subtitle..."
></textarea>

</div>

<div class="card">

<div class="section-title">
Khmer Subtitle
</div>

<textarea
id="khmerText"
placeholder="Khmer subtitle..."
></textarea>

<button
id="speakBtn"
class="speak-btn"
>
🔊 Speak Khmer
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
