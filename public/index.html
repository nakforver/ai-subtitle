<!DOCTYPE html>
<html>
<head>
  <title>AI Khmer Subtitle</title>

  <style>
    body{
      background:black;
      color:white;
      font-family:Arial;
      text-align:center;
      padding:30px;
    }

    textarea{
      width:90%;
      height:200px;
      font-size:28px;
      border-radius:20px;
      padding:20px;
    }

    button{
      margin-top:20px;
      padding:20px 50px;
      font-size:30px;
      border:none;
      border-radius:20px;
      background:#00ff99;
      font-weight:bold;
    }

    #result{
      margin-top:40px;
      font-size:30px;
      background:#222;
      padding:30px;
      border-radius:20px;
    }
  </style>
</head>

<body>

  <h1 style="color:#00ff99;">AI Khmer Subtitle</h1>

  <h2>Type English subtitle:</h2>

  <textarea id="input"></textarea>

  <br>

  <button onclick="translateText()">Translate</button>

  <div id="result"></div>

  <script>
    async function translateText() {

      const text = document.getElementById("input").value;

      const resultDiv = document.getElementById("result");

      resultDiv.innerHTML = "Translating...";

      try {

        const response = await fetch("/translate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            text: text
          })
        });

        const data = await response.json();

        resultDiv.innerHTML = `
          <h2>Khmer Subtitle:</h2>
          <p>${data.khmer}</p>
        `;

      } catch (error) {

        resultDiv.innerHTML = "Error translating subtitle";

      }
    }
  </script>

</body>
</html>
