<!DOCTYPE html>
<html>
<head>
  <title>AI Khmer Subtitle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body{
      background:#111;
      color:white;
      font-family:Arial;
      padding:20px;
      text-align:center;
    }

    h1{
      color:#00ff99;
    }

    textarea{
      width:100%;
      height:120px;
      margin-top:20px;
      border:none;
      border-radius:10px;
      padding:10px;
      font-size:16px;
    }

    button{
      margin-top:20px;
      background:#00ff99;
      border:none;
      padding:15px 30px;
      border-radius:10px;
      font-size:18px;
      font-weight:bold;
    }

    #result{
      margin-top:20px;
      background:#222;
      padding:20px;
      border-radius:10px;
    }
  </style>
</head>
<body>

<h1>AI Khmer Subtitle</h1>

<p>Type English subtitle:</p>

<textarea id="text"></textarea>

<br>

<button onclick="translateText()">Translate</button>

<div id="result"></div>

<script>
async function translateText(){

  const text = document.getElementById("text").value;

  const response = await fetch("/subtitle",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      text:text
    })
  });

  const data = await response.json();

  document.getElementById("result").innerHTML =
    "<h3>Khmer Subtitle:</h3>" +
    data.khmer;
}
</script>

</body>
</html>
