<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Khmer Subtitle</title>

<style>

body{
    background:#000;
    color:white;
    text-align:center;
    font-family:Arial,sans-serif;
}

h1{
    color:#00ff99;
}

textarea{
    width:90%;
    height:180px;
    font-size:22px;
    padding:15px;
}

button{
    background:#00ff99;
    border:none;
    padding:15px 30px;
    font-size:22px;
    border-radius:10px;
    cursor:pointer;
    margin-top:15px;
}

#result{
    width:90%;
    margin:auto;
    margin-top:20px;
    background:#222;
    padding:20px;
    border-radius:12px;
    min-height:80px;
}

#status{
    margin-top:20px;
}

</style>

</head>

<body>

<h1>AI Khmer Subtitle</h1>

<h3>English → Khmer</h3>

<textarea
id="englishText"
placeholder="Type English subtitle..."
></textarea>

<br>

<button id="translateBtn">
Translate
</button>

<div id="result"></div>

<hr>

<h3>Upload Audio / Video</h3>

<input
type="file"
id="mediaFile"
accept="audio/*,video/*"
/>

<br>

<button id="uploadBtn">
Upload File
</button>

<div id="status"></div>

<script src="script.js"></script>

</body>
</html>
