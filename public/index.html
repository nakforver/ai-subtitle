<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Khmer Subtitle Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
padding:20px;
}

h1{
text-align:center;
color:#00ff99;
font-size:48px;
margin:30px 0;
}

.card{
background:#111;
border-radius:25px;
padding:25px;
margin-bottom:25px;
}

.upload-box{
border:4px dashed #00ff99;
border-radius:20px;
padding:30px;
text-align:center;
}

.upload-box h2{
font-size:42px;
margin-bottom:10px;
}

.upload-box p{
font-size:24px;
color:#ccc;
margin-bottom:20px;
}

input[type=file]{
font-size:20px;
width:100%;
}

button{
width:100%;
border:none;
border-radius:20px;
padding:20px;
font-size:32px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
background:#00ff99;
color:black;
}

button:hover{
opacity:.9;
}

#status{
text-align:center;
font-size:32px;
color:#00ff99;
margin-top:20px;
}

.section-title{
font-size:42px;
margin-bottom:15px;
}

textarea{
width:100%;
min-height:180px;
padding:20px;
font-size:24px;
border:none;
border-radius:20px;
resize:vertical;
}

#speakBtn{
margin-top:20px;
}

@media(max-width:600px){

h1{
font-size:34px;
}

.section-title{
font-size:30px;
}

button{
font-size:24px;
}

textarea{
font-size:20px;
}

}

</style>
</head>

<body>

<h1>AI Khmer Subtitle Pro</h1>

<div class="card">

<div class="upload-box">

<h2>🎬 Upload Movie</h2>

<p>English / Chinese Video</p>

<input
type="file"
id="videoInput"
accept="video/*">

</div>

<button id="generateBtn">
🚀 Generate Khmer Subtitle
</button>

<div id="status">
Waiting...
</div>

</div>

<div class="card">

<h2 class="section-title">
Detected Text
</h2>

<textarea
id="detectedText"
placeholder="Detected English subtitle..."
></textarea>

</div>

<div class="card">

<h2 class="section-title">
Khmer Subtitle
</h2>

<textarea
id="khmerText"
placeholder="Khmer subtitle..."
></textarea>

<button id="speakBtn">
🔊 Speak Khmer
</button>

</div>

<script src="script.js"></script>

</body>
</html>
